model:
  model_name: facebook/mask2former-swin-base-ade-semantic
  task_type: segmentation
  num_classes: 150
  pretrained: true
  image_size: 512
  learning_rate: 1e-4
  weight_decay: 5e-2
  scheduler: cosine
  epochs: 50
  # Segmentation-specific
  aux_loss_weight: 0.4
  mask_threshold: 0.5
data:
  train_data_path: /Volumes/<catalog>/<schema>/<volume>/<path>/data/segmentation/train/
  val_data_path: /Volumes/<catalog>/<schema>/<volume>/<path>/data/segmentation/val/
  batch_size: 4
  num_workers: 4
  model_name: facebook/mask2former-swin-base-ade-semantic
  image_size:
  - 512
  - 512
  augment: true
  augmentations:
    horizontal_flip: true
    random_crop: true
    color_jitter: 0.2
training:
  max_epochs: 50
  early_stopping_patience: 10
  monitor_metric: val_miou
  monitor_mode: max
  checkpoint_dir: /Volumes/<catalog>/<schema>/<volume>/<path>/checkpoints/mask2former
  volume_checkpoint_dir: /Volumes/<catalog>/<schema>/<volume>/<path>/volume_checkpoints/mask2former
  save_top_k: 3
  log_every_n_steps: 50
  use_gpu: true
mlflow:
  experiment_name: /Users/<your.email@databricks.com>/cv_segmentation_mask2former
  run_name: mask2former_swin_base
  log_model: true
  tags:
    framework: hf_trainer
    model: mask2former
    task: segmentation
    dataset: ade20k
output:
  results_dir: /Volumes/<catalog>/<schema>/<volume>/<path>/results/mask2former
  save_predictions: true
serving:
  registered_model_name: <catalog>.<schema>.mask2former_segmentation
  endpoint_name: mask2former-segmentation-endpoint
  workload_size: Small
  scale_to_zero: true
monitoring:
  drift_threshold: 0.1
  error_rate_threshold: 0.05
  latency_p95_threshold_ms: 500
