model:
  model_name: facebook/mask2former-swin-base-coco-instance
  task_type: segmentation
  num_classes: 80
  pretrained: true
  image_size: 512
  learning_rate: 1e-4
  weight_decay: 5e-2
  scheduler: cosine
  scheduler_params:
    T_max: 300
    eta_min: 1e-6
  epochs: 2
  aux_loss_weight: 0.4
  mask_threshold: 0.5
data:
  train_data_path: /Volumes/users/aradhya_chouhan/cv_arch_test/coco2017_detection_dataset/val2017/
  train_annotation_file: /Volumes/users/aradhya_chouhan/cv_arch_test/coco2017_detection_dataset/annotations/instances_val2017.json
  val_data_path: /Volumes/users/aradhya_chouhan/cv_arch_test/coco2017_detection_dataset/val2017/
  val_annotation_file: /Volumes/users/aradhya_chouhan/cv_arch_test/coco2017_detection_dataset/annotations/instances_val2017.json
  batch_size: 2
  num_workers: 4
  model_name: facebook/mask2former-swin-base-coco-instance
  image_size:
  - 512
  - 512
  normalize_mean:
  - 0.485
  - 0.456
  - 0.406
  normalize_std:
  - 0.229
  - 0.224
  - 0.225
  augment: false
training:
  max_epochs: 2
  early_stopping_patience: 5
  monitor_metric: val_miou
  monitor_mode: max
  checkpoint_dir: /tmp/checkpoints/sanity_mask2former
  save_top_k: 1
  log_every_n_steps: 10
  use_gpu: true
  volume_checkpoint_dir: /Volumes/users/aradhya_chouhan/cv_arch_test/checkpoints/sanity_mask2former
mlflow:
  experiment_name: /Users/aradhya.chouhan@databricks.com/CV_Accelerator
  run_name: sanity_mask2former_coco_instances
  log_model: false
  tags:
    framework: hf_trainer
    model: mask2former
    task: segmentation
    dataset: coco_val_instances
    test_type: sanity_check
output:
  results_dir: /tmp/results/sanity_mask2former
  save_predictions: false
