[theme]
base                    = "dark"
primaryColor            = "#00C2A8"
backgroundColor         = "#0D0F12"
secondaryBackgroundColor = "#141720"
textColor               = "#EDF0F7"
font                    = "monospace"

[server]
headless = true
enableCORS = false
enableXsrfProtection = false

[browser]
gatherUsageStats = false
